[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "yule-integrations"
version = "0.1.0"
description = "External service integrations for Yule Studio agents: Naver CalDAV calendar + GitHub issues/pulls (via gh CLI)."
requires-python = ">=3.9"
dependencies = [
  "caldav>=1.4.0",
  "icalendar>=6.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]
