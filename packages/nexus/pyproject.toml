[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "nexus"
version = "0.1.0"
description = "Nexus — ForgeKit's knowledge source boundary (read/projection/retrieval). Discovery source collectors + Obsidian vault read/authorship. Pure, stdlib-first."
requires-python = ">=3.9"
dependencies = ["forgekit-config"]

[tool.setuptools.packages.find]
where = ["src"]
