[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "forgekit-toolchain"
version = "0.1.0"
description = "ForgeKit toolchain/language/framework version switching — repo-local version detection, loadout→toolchain profile, mise-backed switch/verify/drift. Destructive/global writes are approval-gated; no fake switch."
requires-python = ">=3.9"
dependencies = ["forgekit-config", "armory"]

[tool.setuptools.packages.find]
where = ["src"]
