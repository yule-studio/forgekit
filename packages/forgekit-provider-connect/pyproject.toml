[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "forgekit-provider-connect"
version = "0.1.0"
description = "ForgeKit provider onboarding/connect — honest connection diagnosis (CLI attach / API key / local daemon) + /setup bootstrap on top of forgekit-provider. No fake-live."
requires-python = ">=3.9"
dependencies = ["forgekit-provider", "forgekit-config"]

[tool.setuptools.packages.find]
where = ["src"]
